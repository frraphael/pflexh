<div class="p-8">
    <h2 class="mb-4 text-lg font-semibold uppercase text-red-700">Nossos Parceiros</h2>
    <h3 class="text-center lg:text-start text-2xl mb-4">Conheça nossos parceiros e clientes:</h3>
    <div class="flex flex-col lg:flex-row items-center justify-around">
        @for (p of partners; track $index) {
            <div class="w-42 mb-4 lg:mb-0">
                <img [src]="p.logo" [alt]="p.partner" class="h-42 rounded-4xl object-fit grayscale hover:grayscale-0 transition-all duration-300 cursor-pointer">
                <p class="text-center text-xl font-semibold">{{p.partner}}</p>
            </div>
        }
    </div>
</div>
