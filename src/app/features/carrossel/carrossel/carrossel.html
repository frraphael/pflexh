<div class="relative w-full  overflow-hidden rounded-lg shadow-xl">
  
  <!-- Container dos Slides -->
  <div class="flex transition-transform duration-500 ease-in-out"
       [style.transform]="'translateX(-' + (currentIndex() * 100) + '%)'">
    
    @for (slide of slides(); track $index) {
      <div class="w-full flex-shrink-0 relative h-[480px]">
        <img [src]="slide.image" class="w-full h-full object-cover brightness-75 -z-20 relative">
        
        <!-- Legenda com suas classes favoritas -->
        <div class="absolute top-24 left-8 lg:left-20 text-white lg:w-[30%] text-baseline">
          <h3 class="leading-tight font-bold text-shadow-lg/60 text-4xl lg:text-6xl">{{ slide.title }}</h3>
        </div>
        <div class="absolute top-72 left-8 lg:left-20 bg-red-700/85 p-2 rounded-lg text-white w-92 lg:w-[30%] text-baseline">
            <h3 class="leading-tight font-bold text-xl ">{{ slide.description }}</h3>
        </div>
        <div class="absolute !h-24 !w-26 top-14 lg:top-20 left-4 lg:left-16 bg-red-700 rounded-tl-2xl rounded-br-2xl -z-10"></div>

      </div>
    }
  </div>

  <!-- Botões de Navegação (Com seu vermelho bg-red-700) -->
  <button (click)="prev()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-red-700/80 p-2 rounded-full text-white hover:bg-red-700">
    ❮
  </button>
  <button (click)="next()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-red-700/80 p-2 rounded-full text-white hover:bg-red-700">
    ❯
  </button>

  <!-- Indicadores de bolinha (li) -->
  <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-2">
    @for (s of slides(); track $index) {
      <button (click)="currentIndex.set($index)"
              [class]="'h-3 w-3 rounded-full transition-colors ' + 
                       ($index === currentIndex() ? 'bg-red-700' : 'bg-white/50')">
      </button>
    }
  </div>
</div>
