<div class="">
  <div class="lg:flex">
    <div class="lg:w-[50%]">
        <div class="text-end p-8">
            <h2 class="mb-6 text-lg font-semibold text-red-700 uppercase">Áreas de atuação</h2>
            <p class="text-2xl font-semibold mb-8">
                Design de interiores, projetos arquitetônicos
                e consultoria em construção são alguns dos serviços de arquitetura
                que oferecemos para criar ambientes únicos e funcionais.
            </p>
            <div class="flex justify-end">
                <button
                (click)="openDialog(services)"
                class="uppercase p-2 border bg-red-700 text-white border-red-700 mb-4 rounded-lg hover:bg-white hover:border-red-700 hover:text-red-700 text-xl font-bold cursor-pointer"
                >
                Leia mais...
            </button>
        </div>
    </div>
    </div>
    <div class="lg:w-[50%]">
        <img src="/projects/projetos.png" alt="Nossos projetos">
    </div>
  </div>
  <div class="p-8 lg:flex lg:justify-between">
    @for (p of projects; track $index) {
      <mat-card class="lg:w-[400px] mb-8 lg:mb-0" appearance="outlined">
        <img
          mat-card-image
          [src]="p.image"
          [alt]="p.title"
          class="mb-4"
        />
        <mat-card-content class="h-56 lg:h48">
            <p class="text-2xl uppercase mb-4">{{p.title}}</p>
          <p class="text-md text-balance">{{p.body}}</p>
        </mat-card-content>
        <mat-card-actions class="flex justify-end">
          <button
            (click)="openDialog(p.modalText)"
            class="uppercase p-2 border bg-red-700 text-white border-red-700 mb-4 rounded-lg hover:bg-white hover:border-red-700 hover:text-red-700 text-xl font-bold cursor-pointer"
            >
            Leia mais...
        </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
